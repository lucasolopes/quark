name: CLA Assistant

# Coleta a assinatura do Contributor License Agreement (CLA.md) em cada PR.
# Self-hosted: as assinaturas ficam num arquivo no próprio repo
# (signatures/version1/cla.json), sem serviço externo.
#
# SETUP (uma vez, no GitHub):
#   1. Crie um Personal Access Token (classic) com escopo `repo`, ou um
#      fine-grained token com permissão de Contents (read/write) neste repo.
#   2. Em Settings → Secrets and variables → Actions, adicione um secret
#      chamado PERSONAL_ACCESS_TOKEN com esse token.
# Sem o secret o workflow falha ao gravar a assinatura; o GITHUB_TOKEN padrão
# sozinho não basta a partir do contexto pull_request_target em alguns casos.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/lucasolopes/quark/blob/main/CLA.md'
          branch: 'main'
          # o próprio dono não precisa assinar; bots idem
          allowlist: lucasolopes,bot*,dependabot[bot]
          custom-notsigned-prcomment: >
            Obrigado pelo PR! Antes do merge, precisamos que você aceite o
            [Contributor License Agreement](https://github.com/lucasolopes/quark/blob/main/CLA.md).
            É uma concessão de licença — **você mantém a titularidade do seu código**.
            Para assinar, comente exatamente:
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'Todos os contribuidores assinaram o CLA. ✅'
