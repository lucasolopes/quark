# Test identity provider for the OIDC-login E2E suite (see web/e2e/).
# Keycloak runs in Docker exposed on localhost:8081; quark runs NATIVELY so both
# the browser and the quark backend resolve the same issuer
# (http://localhost:8081/realms/quark), avoiding the in-Docker/out-of-Docker
# issuer mismatch. Start with: docker compose -f docker-compose.e2e.yml up -d
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm", "--http-port=8081"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports: ["8081:8081"]
    volumes:
      - ./e2e/keycloak:/opt/keycloak/data/import:ro
    # No container healthcheck: the Keycloak image ships without curl/bash, so a
    # CMD probe is unreliable. Readiness is polled from the host by the E2E
    # global-setup (it waits on the realm discovery endpoint).
