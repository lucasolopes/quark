# quark production — single region (São Paulo) to start. Add regions later per
# docs/DEPLOY-MULTIREGION.md; the read/write split (QUARK_REPLICA_DATABASE_URL)
# activates then. Secrets are set with `fly secrets set`, never here.
app = "quark-prod"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  QUARK_ADDR = "0.0.0.0:8080"
  # Shared short-link host + CNAME target for tenant custom domains (LUC-84).
  # Not the API host (that's QUARK_ADMIN_HOST) and not the OIDC redirect
  # (QUARK_OIDC_REDIRECT_URL); it is only where shared/default short links live.
  QUARK_PUBLIC_HOST = "go.quarkus.com.br"
  # API/admin host: in cloud, /admin/* only answers here — never on a tenant's
  # link domain (LUC-85). The panel talks to this host; the OIDC callback lands
  # here too.
  QUARK_ADMIN_HOST = "backend.quarkus.com.br"
  # Auto per-tenant subdomain base (LUC-82): each workspace gets
  # <slug>.quarkus.com.br for its short links, served via the *.quarkus.com.br
  # wildcard cert.
  QUARK_TENANT_DOMAIN_SUFFIX = "quarkus.com.br"
  # Scheduled Google Sheets sync interval, seconds (LUC-87 fase 1b). Every
  # connected tenant's catalog is mirrored on this cadence (lease-coordinated,
  # floored to 60s). Needs QUARK_PUBLIC_HOST (set above) for correct short URLs.
  QUARK_SHEETS_SYNC_SECS = "900"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    method = "get"
    path = "/health"
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
